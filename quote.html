<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Quote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="book.css">
</head>
<body>
  <main class="booking-page">
    <section class="booking-shell quote-shell">
      <p class="eyebrow">Quote review</p>
      <h1 id="quote-title">Loading quote...</h1>
      <div class="quote-total" id="quote-total">A$0</div>
      <p class="booking-copy" id="quote-copy"></p>
      <div class="quote-actions">
        <button class="primary-btn" id="accept-quote">Accept quote</button>
        <button class="ghost-btn" id="decline-quote">Decline</button>
      </div>
      <p class="booking-status" id="quote-status"></p>
    </section>
  </main>
  <script src="quote.js"></script>
</body>
</html>
