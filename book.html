<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request Landscaping Work</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="book.css">
</head>
<body>
  <main class="booking-page">
    <section class="booking-shell">
      <a class="brand" href="/">
        <span class="brand-mark">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 17.5c6.8-.4 11-4.6 12.5-12.5 3.2 7.7.8 14.6-6.7 17.2C8.1 23.1 5.4 21 5 17.5Z"/><path d="M5.3 17.4C8.6 14.9 12 11.8 15.5 8"/></svg>
        </span>
        TerrainDesk
      </a>
      <p class="eyebrow">Landscaping request</p>
      <h1>Tell us what needs doing.</h1>
      <p class="booking-copy">Your request goes straight to the landscaping company so they can quote, schedule and follow up from their TerrainDesk workspace.</p>
      <form id="booking-form" class="booking-form">
        <label>Name <input name="name" required placeholder="Sarah Taylor"></label>
        <label>Email <input name="email" type="email" required placeholder="sarah@example.com"></label>
        <label>Phone <input name="phone" placeholder="+61 400 000 000"></label>
        <label>Suburb <input name="suburb" placeholder="Fremantle"></label>
        <label>Service
          <select name="service">
            <option>Lawn mowing</option>
            <option>Garden cleanup</option>
            <option>Maintenance contract</option>
            <option>Irrigation repair</option>
            <option>Design and build</option>
          </select>
        </label>
        <label>Timing
          <select name="urgency">
            <option>This week</option>
            <option>Next 2 weeks</option>
            <option>Flexible</option>
          </select>
        </label>
        <button class="primary-btn" type="submit">Send request</button>
      </form>
      <p class="booking-status" id="booking-status"></p>
    </section>
  </main>
  <script src="book.js"></script>
</body>
</html>
